<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Open Raise Advisor</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Open Raise">
<meta name="theme-color" content="#0a0c10">
<link rel="manifest" href="https://irrelevantaa.github.io/Poker/manifest.json">
<link rel="apple-touch-icon" href="https://irrelevantaa.github.io/Poker/file_0000000014f071f59ec882ea56c802ae~2.png">
<link rel="icon" type="image/png" href="https://irrelevantaa.github.io/Poker/file_0000000014f071f59ec882ea56c802ae~2.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #13161d;
    --surface2: #1c2030;
    --border: #2a2f3d;
    --raise: #e8472a;
    --raise-glow: rgba(232,71,42,0.3);
    --call: #27a96c;
    --call-glow: rgba(39,169,108,0.3);
    --fold: #3a3f50;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #e8472a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    width: 100%;
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.08em;
    color: var(--text);
    line-height: 1;
  }

  .header-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .section {
    width: 100%;
    padding: 16px 20px 0;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Position selector */
  .position-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .pos-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .pos-btn:hover { border-color: var(--accent); color: var(--text); }
  .pos-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 16px var(--raise-glow);
  }

  /* Card selector */
  .card-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .card-picker {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-picker-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 600;
  }

  .card-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .card-display.red { color: #e8472a; }
  .card-display.black { color: var(--text); }
  .card-display.placeholder { color: var(--border); }

  .rank-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 3px;
    margin-top: 4px;
  }

  .rank-btn, .suit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    padding: 6px 2px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
  }

  .rank-btn:hover, .suit-btn:hover {
    border-color: var(--accent);
    background: rgba(232,71,42,0.1);
  }

  .rank-btn.selected, .suit-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .suit-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 4px;
  }

  .suit-btn {
    font-size: 1.1rem;
    padding: 8px 4px;
  }

  .suit-btn.red-suit { color: #e84040; }
  .suit-btn.black-suit { color: var(--text); }

  /* Inputs row */
  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 6px;
  }

  .input-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .input-group label {
    display: block;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .input-stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .step-btn:hover { border-color: var(--accent); background: rgba(232,71,42,0.1); }

  .step-value {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    text-align: center;
  }

  .step-unit {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  /* Decision button */
  .analyze-btn {
    width: calc(100% - 40px);
    margin: 20px 20px 0;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 20px var(--raise-glow);
  }

  .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--raise-glow); }
  .analyze-btn:active { transform: translateY(0); }

  /* Result card */
  .result {
    width: calc(100% - 40px);
    margin: 16px 20px 0;
    border-radius: 16px;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 8px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result.raise {
    display: flex;
    background: linear-gradient(135deg, rgba(232,71,42,0.2), rgba(232,71,42,0.05));
    border: 1px solid var(--raise);
    box-shadow: 0 0 30px rgba(232,71,42,0.15);
  }

  .result.call {
    display: flex;
    background: linear-gradient(135deg, rgba(39,169,108,0.2), rgba(39,169,108,0.05));
    border: 1px solid var(--call);
    box-shadow: 0 0 30px rgba(39,169,108,0.15);
  }

  .result.fold {
    display: flex;
    background: linear-gradient(135deg, rgba(58,63,80,0.4), rgba(58,63,80,0.1));
    border: 1px solid var(--fold);
  }

  .result-action {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.1em;
    line-height: 1;
  }

  .result.raise .result-action { color: var(--raise); text-shadow: 0 0 20px var(--raise-glow); }
  .result.call .result-action { color: var(--call); text-shadow: 0 0 20px var(--call-glow); }
  .result.fold .result-action { color: #8b90a0; }

  .result-hand {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
    opacity: 0.8;
  }

  .result-detail {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 4px;
  }

  .result-tip {
    font-size: 0.72rem;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 4px;
    line-height: 1.5;
    border-left: 2px solid var(--border);
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 16px 0 0;
  }

  .error-msg {
    width: calc(100% - 40px);
    margin: 12px 20px 0;
    padding: 12px 16px;
    background: rgba(232,71,42,0.08);
    border: 1px solid rgba(232,71,42,0.3);
    border-radius: 10px;
    font-size: 0.8rem;
    color: #e8b4a0;
    display: none;
  }

  .connector {
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    padding-top: 20px;
  }

  /* Modal for card selection */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    animation: slideUpModal 0.2s ease;
  }

  @keyframes slideUpModal {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal-step {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .modal-done {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.12s;
  }

  .modal-done:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="header-title">Open Raise</div>
  <div class="header-sub">GTO Pre-flop Advisor</div>
</header>

<!-- POSITION -->
<div class="section" style="margin-top:8px">
  <div class="section-label">Position</div>
  <div class="position-grid">
    <button class="pos-btn" onclick="selectPosition('UTG')">UTG</button>
    <button class="pos-btn" onclick="selectPosition('HJ')">HJ</button>
    <button class="pos-btn" onclick="selectPosition('CO')">CO</button>
    <button class="pos-btn" onclick="selectPosition('BTN')">BTN</button>
    <button class="pos-btn" onclick="selectPosition('SB')">SB</button>
  </div>
</div>

<!-- CARDS -->
<div class="section" style="margin-top:16px">
  <div class="section-label">Hole Cards</div>
  <div class="card-row">
    <div class="card-picker" onclick="openModal('card1')" style="cursor:pointer">
      <div class="card-picker-label">Card 1</div>
      <div class="card-display placeholder" id="display-card1">—</div>
    </div>
    <div class="connector">+</div>
    <div class="card-picker" onclick="openModal('card2')" style="cursor:pointer">
      <div class="card-picker-label">Card 2</div>
      <div class="card-display placeholder" id="display-card2">—</div>
    </div>
  </div>
</div>

<!-- STACK + PLAYERS -->
<div class="section" style="margin-top:16px">
  <div class="section-label">Table Info</div>
  <div class="inputs-row">
    <div class="input-group">
      <label>Stack Size</label>
      <div class="input-stepper">
        <button class="step-btn" onclick="adjustStack(-10)">−</button>
        <div>
          <div class="step-value" id="stack-val">100</div>
          <div class="step-unit">BB</div>
        </div>
        <button class="step-btn" onclick="adjustStack(10)">+</button>
      </div>
    </div>
    <div class="input-group">
      <label>Players</label>
      <div class="input-stepper">
        <button class="step-btn" onclick="adjustPlayers(-1)">−</button>
        <div>
          <div class="step-value" id="players-val">6</div>
          <div class="step-unit">at table</div>
        </div>
        <button class="step-btn" onclick="adjustPlayers(1)">+</button>
      </div>
    </div>
  </div>
</div>

<div class="error-msg" id="error-msg">Please select your position and both hole cards first.</div>

<button class="analyze-btn" onclick="analyze()">Analyze Hand →</button>

<div class="result" id="result">
  <div class="result-action" id="result-action">RAISE</div>
  <div class="result-hand" id="result-hand"></div>
  <div class="result-detail" id="result-detail"></div>
  <div class="result-tip" id="result-tip"></div>
</div>

<!-- Card Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Select Card</div>
    <div class="modal-step">Rank</div>
    <div class="rank-grid" id="rank-grid"></div>
    <div class="modal-step" style="margin-top:14px">Suit</div>
    <div class="suit-grid" id="suit-grid"></div>
    <button class="modal-done" onclick="confirmCard()">Confirm Card</button>
  </div>
</div>

<script>
const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const SUITS = [['♠','black-suit'],['♥','red-suit'],['♦','red-suit'],['♣','black-suit']];

let state = {
  position: null,
  card1: { rank: null, suit: null },
  card2: { rank: null, suit: null },
  stack: 100,
  players: 6,
};

let modalTarget = null;
let tempRank = null;
let tempSuit = null;

function selectPosition(pos) {
  state.position = pos;
  document.querySelectorAll('.pos-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === pos);
  });
}

function adjustStack(d) {
  state.stack = Math.max(10, Math.min(500, state.stack + d));
  document.getElementById('stack-val').textContent = state.stack;
}

function adjustPlayers(d) {
  state.players = Math.max(2, Math.min(9, state.players + d));
  document.getElementById('players-val').textContent = state.players;
}

function openModal(target) {
  modalTarget = target;
  tempRank = null;
  tempSuit = null;

  document.getElementById('modal-title').textContent =
    target === 'card1' ? 'Select Card 1' : 'Select Card 2';

  // Build rank grid
  const rg = document.getElementById('rank-grid');
  rg.innerHTML = '';
  RANKS.forEach(r => {
    const b = document.createElement('button');
    b.className = 'rank-btn';
    b.textContent = r;
    b.onclick = () => {
      tempRank = r;
      rg.querySelectorAll('.rank-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    rg.appendChild(b);
  });

  // Build suit grid
  const sg = document.getElementById('suit-grid');
  sg.innerHTML = '';
  SUITS.forEach(([sym, cls]) => {
    const b = document.createElement('button');
    b.className = `suit-btn ${cls}`;
    b.textContent = sym;
    b.onclick = () => {
      tempSuit = sym;
      sg.querySelectorAll('.suit-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    sg.appendChild(b);
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) confirmCard();
}

function confirmCard() {
  if (tempRank && tempSuit) {
    const suitColor = (tempSuit === '♥' || tempSuit === '♦') ? 'red' : 'black';
    const card = state[modalTarget];
    card.rank = tempRank;
    card.suit = tempSuit;

    const el = document.getElementById('display-' + modalTarget);
    el.textContent = tempRank + tempSuit;
    el.className = `card-display ${suitColor}`;
  }
  document.getElementById('modal-overlay').classList.remove('open');
}

// =====================
// CHART LOGIC
// =====================

// Returns canonical hand string like "AKs", "AKo", "AA"
function getHandStr(r1, r2, s1, s2) {
  const ri = RANKS.indexOf(r1);
  const rj = RANKS.indexOf(r2);
  // higher rank first
  let high, low;
  if (ri < rj) { high = r1; low = r2; }
  else if (rj < ri) { high = r2; low = r1; }
  else { return r1 + r2; } // pair

  const suited = s1 === s2;
  return high + low + (suited ? 's' : 'o');
}

// Chart data derived from PDF
const CHARTS = {
  UTG: {
    raise: new Set([
      'AA','KK','QQ','JJ','TT','99','88','77','66','55',
      'AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s',
      'AKo','AQo','AJo','ATo',
      'KQs','KJs','KTs','K9s',
      'KQo',
      'QJs','QTs','Q9s',
      'JTs','J9s',
      'T9s',
      'KJo','QJo'
    ]),
    call: new Set([]),
    // everything else = fold
  },
  HJ: {
    raise: new Set([
      'AA','KK','QQ','JJ','TT','99','88','77','66','55','44',
      'AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s',
      'AKo','AQo','AJo','ATo',
      'KQs','KJs','KTs','K9s',
      'KQo','KJo',
      'QJs','QTs','Q9s',
      'QJo',
      'JTs','J9s',
      'T9s',
      'KTo','QTo','JTo',
      'A9o'
    ]),
    call: new Set([]),
  },
  CO: {
    raise: new Set([
      'AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22',
      'AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s',
      'AKo','AQo','AJo','ATo','A9o',
      'KQs','KJs','KTs','K9s','K8s',
      'KQo','KJo','KTo',
      'QJs','QTs','Q9s','Q8s',
      'QJo','QTo',
      'JTs','J9s','J8s',
      'JTo',
      'T9s','T8s',
      '98s','97s',
      '87s','86s',
      '76s','75s',
      '65s','64s',
      '54s','53s',
    ]),
    call: new Set([]),
  },
  BTN: {
    raise: new Set([
      'AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22',
      'AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s',
      'AKo','AQo','AJo','ATo','A9o','A8o','A7o','A6o','A5o',
      'KQs','KJs','KTs','K9s','K8s','K7s',
      'KQo','KJo','KTo','K9o',
      'QJs','QTs','Q9s','Q8s','Q7s',
      'QJo','QTo','Q9o',
      'JTs','J9s','J8s','J7s',
      'JTo','J9o',
      'T9s','T8s','T7s',
      'T9o',
      '98s','97s','96s',
      '87s','86s','85s',
      '76s','75s',
      '65s','64s','63s',
      '54s','53s','52s',
      '43s','42s',
      '32s',
    ]),
    call: new Set([]),
  },
  SB: {
    raise: new Set([
      'AA','KK','QQ','JJ','TT',
      'AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s',
      'AKo','AQo','AJo','ATo','A9o','A8o','A7o','A6o','A5o','A4o','A3o','A2o',
      'KQs','KJs','KTs','K9s','K8s','K7s',
      'KQo','KJo','KTo','K9o','K8o',
      'QJs','QTs','Q9s','Q8s','Q7s',
      'QJo','QTo','Q9o','Q8o',
      'JTs','J9s','J8s','J7s',
      'JTo','J9o','J8o',
      'T9s','T8s','T7s','T6s',
      'T9o','T8o',
      '99','88','77','66','55','44','33','22',
    ]),
    call: new Set([
      'A5s','A4s','A3s','A2s',
      'K6s','K5s','K4s','K3s','K2s',
      'Q6s','Q5s','Q4s','Q3s','Q2s',
      'J6s','J5s','J4s','J3s','J2s',
      'T5s','T4s','T3s','T2s',
      '98s','97s','96s','95s',
      '87s','86s','85s',
      '76s','75s','74s',
      '65s','64s','63s',
      '54s','53s',
      '43s',
    ]),
  },
};

function getAction(position, handStr) {
  const chart = CHARTS[position];
  if (!chart) return 'fold';
  if (chart.raise.has(handStr)) return 'raise';
  if (chart.call && chart.call.has(handStr)) return 'call';
  return 'fold';
}

function stackContext(stack, action) {
  if (stack < 20) {
    if (action === 'raise') return 'With a short stack, consider open-jamming rather than a standard raise.';
    if (action === 'call') return 'Short stack note: calling opens up limp-shove lines. A raise or fold may be better.';
  }
  if (stack > 150) {
    if (action === 'raise') return 'Deep stack: your implied odds go up, so this raise becomes even more profitable.';
  }
  return null;
}

function playersContext(players, position, action) {
  if (players <= 4 && action === 'fold') return 'Note: fewer players means wider ranges — this hand may become a raise in short-handed play.';
  if (players >= 8 && action === 'raise') return 'Full ring: tighten up slightly. This hand is still a raise, but watch for multiway pots.';
  return null;
}

function analyze() {
  const errEl = document.getElementById('error-msg');
  const resultEl = document.getElementById('result');

  if (!state.position || !state.card1.rank || !state.card2.rank) {
    errEl.style.display = 'block';
    resultEl.className = 'result';
    return;
  }
  errEl.style.display = 'none';

  const handStr = getHandStr(
    state.card1.rank, state.card2.rank,
    state.card1.suit, state.card2.suit
  );

  const action = getAction(state.position, handStr);

  resultEl.className = 'result ' + action;
  document.getElementById('result-action').textContent = action.toUpperCase();
  document.getElementById('result-hand').textContent =
    `${handStr} · ${state.position} · ${state.stack}BB · ${state.players} players`;

  let detail = '';
  if (action === 'raise') detail = `Open-raise to ~2.5–3BB from ${state.position}.`;
  else if (action === 'call') detail = `This hand is a call if facing a raise, or limp/complete from ${state.position}.`;
  else detail = `Muck it. This hand doesn't have enough equity to open from ${state.position}.`;

  document.getElementById('result-detail').textContent = detail;

  const tips = [
    stackContext(state.stack, action),
    playersContext(state.players, state.position, action),
  ].filter(Boolean);

  const tipEl = document.getElementById('result-tip');
  if (tips.length) {
    tipEl.textContent = tips.join(' ');
    tipEl.style.display = 'block';
  } else {
    tipEl.style.display = 'none';
  }

  resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
